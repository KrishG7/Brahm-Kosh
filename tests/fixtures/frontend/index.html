<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brahm-Kosh Frontend Test</title>
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body>
    <header id="main-header">
        <h1>Welcome to Brahm-Kosh</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero-section" class="banner">
            <div>
                <div>
                    <div>
                        <!-- Deeply nested div soup -->
                        <div id="deep-node">
                            <p>This is extremely nested!</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <form id="contact-form" action="/submit" method="post" data-validate="true">
                <input type="text" name="name" required>
                <input type="email" name="email" required>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer id="main-footer">
        <p>&copy; 2026 Brahm-Kosh</p>
    </footer>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('Submitted');
        });
    </script>
</body>
</html>
